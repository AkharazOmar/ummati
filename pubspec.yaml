name: ummati
description: Ummati — Application islamique complète avec horaires de prière, boussole Qibla, lecture du Coran et plus encore.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.1.0

  # Network
  dio: ^5.4.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Location & compass
  geolocator: ^14.0.2
  flutter_compass: ^0.8.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2

  # UI
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.0.2

  # Internationalization
  intl: ^0.20.2
  scrollable_positioned_list: ^0.3.8
  timezone: ^0.11.0
  just_audio: ^0.10.5
  flutter_tts: ^4.2.0
  path_provider: ^2.1.2
  geocoding: ^4.0.0
  home_widget: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
    - assets/sounds/
    - assets/sounds/adhan/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
